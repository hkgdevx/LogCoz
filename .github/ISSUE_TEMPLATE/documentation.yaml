name: Documentation improvement
description: Suggest an improvement to docs or examples
title: '[Docs]: '
labels:
  - documentation
body:
  - type: textarea
    id: problem
    attributes:
      label: What needs improvement?
      placeholder: Missing, unclear, outdated, or inaccurate docs.
    validations:
      required: true

  - type: textarea
    id: suggestion
    attributes:
      label: Suggested improvement
      placeholder: Describe the doc change.
